<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short Links</title>
<style>
  :root {
    --ink: #111111;
    --paper: #ffffff;
    --mid: #6e6e6e;
    --line: #dddddd;
    --surface: #f6f6f6;
  }

  * { box-sizing: border-box; }
  [hidden] { display: none !important; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    padding: 72px 24px;
  }

  .wrap { width: 100%; max-width: 420px; margin: 0 auto; }

  .kicker {
    margin: 0 0 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mid);
  }

  h1 {
    margin: 0 0 32px;
    font-size: 28px;
    line-height: 1.25;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    white-space: nowrap;
    border: 0;
  }

  .form { display: flex; flex-direction: column; gap: 12px; }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
    font-family: inherit;
  }

  input[type="text"]::placeholder { color: var(--mid); }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(17,17,17,0.1);
  }

  button { font-family: inherit; cursor: pointer; }

  #shortenBtn {
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    transition: opacity 0.15s;
  }

  #shortenBtn:active { opacity: 0.8; }
  #shortenBtn:disabled { opacity: 0.5; cursor: default; }
  #shortenBtn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  .error {
    margin: 14px 0 0;
    font-size: 14px;
    color: var(--ink);
    border-left: 3px solid var(--ink);
    padding-left: 10px;
  }

  .result {
    margin-top: 22px;
    padding: 16px;
    background: var(--surface);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: rise 0.25s ease;
  }

  .result code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.01em;
    overflow-wrap: anywhere;
  }

  #copyBtn {
    flex-shrink: 0;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: transparent;
    color: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 6px;
  }

  #copyBtn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  .footer { margin-top: 30px; font-size: 12px; color: var(--mid); }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .result { animation: none; }
    #shortenBtn { transition: none; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <p class="kicker">Short links &middot; 365 days</p>
    <h1>Paste a link.<br>Get a short one.</h1>

    <form id="shortenForm" class="form">
      <label for="urlInput" class="sr-only">Link to shorten</label>
      <input type="text" id="urlInput" placeholder="Paste your link" autocomplete="off" autocapitalize="off" spellcheck="false" required>
      <button type="submit" id="shortenBtn">Shorten</button>
    </form>

    <p id="errorMsg" class="error" role="alert" hidden></p>

    <div id="result" class="result" hidden>
      <code id="resultLink"></code>
      <button id="copyBtn" type="button">Copy</button>
    </div>

    <p class="footer">Links expire automatically after 365 days.</p>
  </main>

<script>
  const form = document.getElementById('shortenForm');
  const input = document.getElementById('urlInput');
  const btn = document.getElementById('shortenBtn');
  const errorMsg = document.getElementById('errorMsg');
  const result = document.getElementById('result');
  const resultLink = document.getElementById('resultLink');
  const copyBtn = document.getElementById('copyBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.hidden = true;
    result.hidden = true;

    const url = input.value.trim();
    if (!url) return;

    btn.disabled = true;
    btn.textContent = 'Shortening…';

    try {
      const res = await fetch('/api/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();

      if (!res.ok) {
        errorMsg.textContent = data.error || 'Something went wrong. Try again.';
        errorMsg.hidden = false;
      } else {
        resultLink.textContent = data.shortUrl;
        result.hidden = false;
        copyBtn.textContent = 'Copy';
      }
    } catch {
      errorMsg.textContent = 'Network error. Try again.';
      errorMsg.hidden = false;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Shorten';
    }
  });

  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(resultLink.textContent);
      copyBtn.textContent = 'Copied';
      setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
    } catch {
      copyBtn.textContent = 'Failed';
    }
  });
</script>
</body>
</html>
